{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthPulse AI</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="{% static 'js/script.js' %}" defer></script>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<header class="navbar">
    <a class="logo" href="{% url 'home' %}">
        <span class="logo-mark">🧠</span>
        <span class="logo-text">
            <strong>HealthPulse</strong>
            <small>Cyber AI Health Suite</small>
        </span>
    </a>

    <nav class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'heart' %}">Heart</a>
        <a href="{% url 'diabetes' %}">Diabetes</a>
        <a href="{% url 'stress' %}">Stress</a>
        <a href="{% url 'home' %}#games">Games</a>
    </nav>

    <div class="nav-status">LIVE AI</div>
</header>

<main class="main">
    {% block content %}{% endblock %}
</main>

</body>
</html>
